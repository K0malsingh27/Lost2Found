<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost2Found</title>

  <style>
    body { font-family: Arial; margin: 0; background: #eef2f7; }
    header { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; text-align: center; padding: 20px; }
    .container { max-width: 700px; margin: auto; padding: 20px; }
    form { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    input, textarea, button { width: 100%; padding: 10px; margin: 8px 0; }
    button { background: #4facfe; color: white; border: none; cursor: pointer; }
    .post { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
    .delete-btn { background: red; margin-top: 10px; }
    .tag { background: red; color: white; padding: 3px 8px; border-radius: 5px; font-size: 12px; }
  </style>
</head>
<body>

<header>
  <h1>Lost2Found</h1>
  <p>Scan. Connect. Recover.</p>
</header>

<div class="container">

  <form id="lostForm">
    <input type="text" id="item" placeholder="Item Name" required>
    <textarea id="description" placeholder="Description" required></textarea>
    <input type="text" id="location" placeholder="Location" required>
    <input type="text" id="contact" placeholder="Contact" required>
    <button type="submit">Post Lost Item</button>
  </form>

  <div id="posts"></div>

</div>

<script>
  const form = document.getElementById('lostForm');
  const postsDiv = document.getElementById('posts');

  let posts = JSON.parse(localStorage.getItem('lostPosts')) || [];

  function displayPosts() {
    postsDiv.innerHTML = '';
    posts.forEach((p, index) => {
      const post = document.createElement('div');
      post.className = 'post';
      post.innerHTML = `
        <span class="tag">LOST</span>
        <h3>${p.item}</h3>
        <p>${p.description}</p>
        <p><strong>Location:</strong> ${p.location}</p>
        <p><strong>Contact:</strong> ${p.contact}</p>
        <button class="delete-btn" onclick="deletePost(${index})">Delete</button>
      `;
      postsDiv.appendChild(post);
    });
  }

  function deletePost(index) {
    posts.splice(index, 1);
    localStorage.setItem('lostPosts', JSON.stringify(posts));
    displayPosts();
  }

  displayPosts();

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const newPost = {
      item: document.getElementById('item').value,
      description: document.getElementById('description').value,
      location: document.getElementById('location').value,
      contact: document.getElementById('contact').value
    };

    posts.unshift(newPost);
    localStorage.setItem('lostPosts', JSON.stringify(posts));

    displayPosts();
    form.reset();
  });
</script>

</body>
</html>
